<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Reportaje PDF" />
  <link rel="manifest" href="manifest.json" />
  <title>Reportaje PDF</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>Reportaje PDF</h1>
    </div>
  </header>

  <main class="app-main">
    <form id="reportForm" novalidate>
      <section class="form-section">
        <label class="field-label" for="asunto">Asunto general</label>
        <textarea id="asunto" name="asunto" class="field-textarea" rows="2" placeholder="Asunto general del reporte" required></textarea>
      </section>

      <section class="form-section">
        <label class="field-label" for="direccionCliente">Dirección del cliente</label>
        <textarea id="direccionCliente" name="direccionCliente" class="field-textarea" rows="2" placeholder="Dirección completa"></textarea>
      </section>

      <section class="form-section">
        <label class="field-label" for="descripcionGeneral">Descriptivo</label>
        <textarea id="descripcionGeneral" name="descripcionGeneral" class="field-textarea" rows="3" placeholder="Descripción general"></textarea>
      </section>

      <section class="form-section">
        <label class="field-label" for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" class="field-input" required />
      </section>

      <section class="form-section fotos-section">
        <div class="fotos-header">
          <span class="field-label">Fotos</span>
          <div class="foto-add-btns">
            <button type="button" class="btn-add-foto" id="btnGaleria">Galería</button>
            <button type="button" class="btn-add-foto" id="btnCamara">Cámara</button>
          </div>
        </div>

        <input type="file" id="inputGaleria" accept="image/*" multiple style="display:none" />
        <input type="file" id="inputCamara" accept="image/*" capture="environment" style="display:none" />

        <div class="foto-counter" id="fotoCounter" style="display:none">
          <span id="fotoCounterText">0 fotos</span>
          <span class="counter-hint">El PDF usa 4 fotos por página A4.</span>
        </div>

        <div id="fotosContainer" class="fotos-container">
          <div class="fotos-empty" id="fotosEmpty">
            <p>Añade fotos y escribe un comentario para cada una.</p>
          </div>
        </div>
      </section>

      <div class="generate-section">
        <button type="submit" class="btn-generate" id="btnGenerar">Generar PDF</button>
      </div>
    </form>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
